<section class="bg-white py-16">
  <div class="max-w-screen-xl mx-auto px-4 sm:px-6 lg:px-8">
    <div class="max-w-2xl text-start mb-8 md:mb-12">
      <h2 class="text-3xl sm:text-4xl md:text-5xl font-bold mb-4 md:mb-5 text-gray-900">Projects</h2>
    </div>

    <div class="space-y-4 md:space-y-6">
      <article *ngFor="let project of previewProjects" class="border-b border-gray-200 pb-4 md:pb-6 pt-3 md:pt-4 hover:bg-gray-50 transition-all duration-300">
        <div class="flex flex-col md:flex-row md:items-center md:justify-between gap-4">
          <div class="flex items-start md:items-center gap-4 md:gap-6 w-full">
            <img [src]="project.logo" [alt]="project.name" class="w-10 h-10 md:w-12 md:h-12 rounded-lg p-2 bg-gray-100 object-contain" />
            <div class="flex-1">
              <h3 class="text-lg md:text-xl font-bold text-gray-900">{{ project.name }}</h3>
              <p class="text-xs md:text-sm text-gray-500 mt-1">{{ project.description }}</p>
            </div>
          </div>

          <div class="flex items-center gap-3">
            <a *ngIf="project.link" [href]="project.link" target="_blank" rel="noreferrer" class="inline-flex items-center justify-center rounded-full bg-black px-5 py-2.5 text-sm font-semibold text-white transition hover:bg-slate-800 whitespace-nowrap">View project</a>
          </div>
        </div>

        <p class="mt-4 text-sm md:text-base text-gray-600">{{ project.detailedDescription[0] }}</p>
      </article>
    </div>

    <div class="mt-8 text-center">
      <a routerLink="/projects" class="inline-flex items-center justify-center rounded-full bg-black px-6 py-3 text-sm font-semibold text-white transition hover:bg-slate-800 whitespace-nowrap">See more of my projects</a>
    </div>
  </div>
</section>
